<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Create Account — VeriScreen AI</title>
  <link rel="stylesheet" href="/css/style.css"/>
</head>
<body>

<div class="auth-bg" style="min-height:100vh;display:flex;flex-direction:column;">

  <div class="auth-header">
    <div class="auth-logo">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
      </svg>
      ShieldCheck AI
    </div>
    <div class="auth-header-link">
      Already have an account? <a href="/login.html">Sign In</a>
    </div>
  </div>

  <div class="auth-body">
    <div class="auth-card" style="max-width:480px">

      <div class="auth-title" style="text-align:left;margin-bottom:4px">Create Security Account</div>
      <div class="auth-subtitle" style="text-align:left;margin-bottom:24px">Initialize your encrypted screening environment.</div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Full Name</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                <circle cx="12" cy="7" r="4"/>
              </svg>
            </span>
            <input class="form-input" type="text" id="fullname" placeholder="John Doe"/>
          </div>
          <div class="field-error" id="name-error"></div>
        </div>

        <div class="form-group">
          <label class="form-label">Work Email</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                <polyline points="22,6 12,13 2,6"/>
              </svg>
            </span>
            <input class="form-input" type="email" id="email" placeholder="john@company.com"/>
          </div>
          <div class="field-error" id="email-error"></div>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Company Name</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                <polyline points="9 22 9 12 15 12 15 22"/>
              </svg>
            </span>
            <input class="form-input" type="text" id="company" placeholder="Acme Corp"/>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Role / Title</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/>
                <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
              </svg>
            </span>
            <input class="form-input" type="text" id="role" placeholder="Security Officer"/>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Security Password</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <input class="form-input" type="password" id="password" placeholder="••••••••" oninput="checkStrength(this.value)"/>
          <button class="input-toggle" onclick="togglePw('password')" type="button">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <div class="strength-bar"><div class="strength-fill" id="strength-fill"></div></div>
        <div class="strength-label" id="strength-label">NONE</div>
        <div class="field-error" id="pw-error"></div>
      </div>

      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>
            </svg>
          </span>
          <input class="form-input" type="password" id="confirm" placeholder="••••••••"/>
          <button class="input-toggle" onclick="togglePw('confirm')" type="button">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <div class="field-error" id="confirm-error"></div>
      </div>

      <div class="checkbox-wrap">
        <input type="checkbox" id="terms"/>
        <label for="terms">
          I agree to the <a href="#">Security Protocols</a> and <a href="#">Privacy Architecture</a>.
        </label>
      </div>
      <div class="field-error" id="terms-error"></div>

      <button class="btn btn-primary" onclick="handleRegister()">Initialize Account →</button>

      <div class="auth-links">Already have an account? <a href="/login.html">Sign In</a></div>

    </div>
  </div>

  <div class="auth-footer">
    <a href="#">Privacy Policy</a>
    <a href="#">Terms of Service</a>
    <a href="#">Security Architecture</a>
    <span>© 2024 ShieldCheck AI. Secure Verification Protocol.</span>
  </div>

</div>

<script src="/js/auth.js"></script>
<script>
  function togglePw(id) {
    const inp = document.getElementById(id);
    inp.type = inp.type === 'password' ? 'text' : 'password';
  }

  function checkStrength(pw) {
    const fill = document.getElementById('strength-fill');
    const label = document.getElementById('strength-label');
    let pct = 0, color = '#ef4444', text = 'WEAK';
    if (pw.length >= 6) { pct = 33; color = '#ef4444'; text = 'WEAK'; }
    if (pw.length >= 8 && /[A-Z]/.test(pw) && /[0-9]/.test(pw)) { pct = 66; color = '#eab308'; text = 'MEDIUM'; }
    if (pw.length >= 10 && /[A-Z]/.test(pw) && /[0-9]/.test(pw) && /[^A-Za-z0-9]/.test(pw)) { pct = 100; color = '#22c55e'; text = 'STRONG'; }
    if (!pw) { pct = 0; text = 'NONE'; color = '#64748b'; }
    fill.style.width = pct + '%';
    fill.style.background = color;
    label.textContent = text;
    label.style.color = color;
  }

  function showErr(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg; el.classList.add('show');
  }

  function clearErrs() {
    document.querySelectorAll('.field-error').forEach(e => e.classList.remove('show'));
  }

  function handleRegister() {
    clearErrs();
    const name = document.getElementById('fullname').value.trim();
    const email = document.getElementById('email').value.trim();
    const pw = document.getElementById('password').value;
    const confirm = document.getElementById('confirm').value;
    const terms = document.getElementById('terms').checked;

    if (!name) { showErr('name-error', 'Please enter your full name.'); return; }
    if (!email || !email.includes('@')) { showErr('email-error', 'Invalid email format.'); return; }
    if (pw.length < 6) { showErr('pw-error', 'Password must be at least 6 characters.'); return; }
    if (pw !== confirm) { showErr('confirm-error', 'Passwords do not match.'); return; }
    if (!terms) { showErr('terms-error', 'Please accept the terms to continue.'); return; }

    const result = register({
      name,
      email,
      company: document.getElementById('company').value.trim(),
      role: document.getElementById('role').value.trim(),
      password: pw
    });

    if (result.success) {
      alert('Account created successfully! Redirecting to login...');
      setTimeout(() => window.location.href = '/login.html', 1000);
    } else {
      showErr('email-error', result.error);
    }
  }
</script>
</body>
</html>
